<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xpay Student Portal</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4f7fb, #eaf3ff);
      padding: 20px;
    }

    .container {
      max-width: 450px;
      margin: 30px auto;
      background: white;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .logo {
      width: 115px;
      height: 115px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h2 {
      margin: 8px 0 6px;
      color: #0b3c6f;
      font-size: 26px;
    }

    .subtitle {
      margin: 0 0 22px;
      color: #5b6470;
      font-size: 14px;
    }

    label {
      display: block;
      text-align: left;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #d6dbe3;
      border-radius: 12px;
      font-size: 16px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #2f80ed;
      box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      background: linear-gradient(135deg, #1f6fd6, #0f9d8a);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 18px;
        margin: 16px auto;
      }

      h2 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" class="logo" alt="Xpay Logo">

    <h2>Xpay Student Payment</h2>
    <p class="subtitle">Secure monthly tuition fee submission portal</p>

    <form>
      <label>Student ID</label>
      <input type="text" id="studentId" placeholder="Enter student ID">

      <label>Student Name</label>
      <input type="text" id="name" placeholder="Enter student name">

      <label>Contact Number</label>
      <input type="text" id="contact" placeholder="01XXXXXXXXX">

      <label>Payment Month</label>
      <select id="month">
        <option>Select month</option>
        <option>January</option>
        <option>February</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
      </select>

      <label>Tuition Fee</label>
      <input type="number" id="amount" placeholder="Enter amount">

      <label>Remarks</label>
      <textarea id="remarks" placeholder="Optional note"></textarea>

      <button type="submit">Submit Payment</button>
    </form>
  </div>
</body>
</html>
